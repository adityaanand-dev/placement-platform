service: placement-recruitment-backend

provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1

  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource: 'arn:aws:dynamodb:ap-south-1:*:table/PlacementPlatformStudents'

functions:
  registerStudent:
    handler: src/students.register
    events:
      - http:
          path: /students/register
          method: post
          cors: true

resources:
  Resources:
    StudentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: PlacementPlatformStudents
        BillingMode: PAY_PER_REQUEST
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH