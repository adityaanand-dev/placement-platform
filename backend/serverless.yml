service: placement-platform-backend
provider:
  name: aws
  runtime: nodejs18.x
  region: ap-south-1

  # 1. Inject Identity & Access Management (IAM) permissions for database interactions
  iam:
    role:
      statements:
        - Effect: Allow
          Action:
            - dynamodb:PutItem
            - dynamodb:GetItem
            - dynamodb:UpdateItem
            - dynamodb:DeleteItem
            - dynamodb:Query
            - dynamodb:Scan
          Resource: 'arn:aws:dynamodb:ap-south-1:*:table/Students'

functions:
  registerStudent:
    handler: src/students.register
    events:
      - http:
          path: /students/register
          method: post
          cors: true

# 2. Tell AWS to automatically build the DynamoDB Table infrastructure
resources:
  Resources:
    StudentsTable:
      Type: AWS::DynamoDB::Table
      Properties:
        TableName: Students
        BillingMode: PAY_PER_REQUEST # Serverless auto-scaling billing
        AttributeDefinitions:
          - AttributeName: email
            AttributeType: S
        KeySchema:
          - AttributeName: email
            KeyType: HASH # Configures email as the unique Partition Key